spring:
  application:
    name: library

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${LIBRARY_DB_URL:jdbc:mysql://localhost:3306/librarymanage?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${LIBRARY_DB_USERNAME:root}
    password: ${LIBRARY_DB_PASSWORD:}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: library.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      update-strategy: not_null

server:
  port: 8080

jwt:
  secret: ${LIBRARY_JWT_SECRET}
  expiration: ${LIBRARY_JWT_EXPIRATION:86400000}

library:
  cors:
    allowed-origins: ${LIBRARY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  metadata:
    proxy:
      enabled: ${LIBRARY_METADATA_PROXY_ENABLED:false}
      host: ${LIBRARY_METADATA_PROXY_HOST:127.0.0.1}
      port: ${LIBRARY_METADATA_PROXY_PORT:7890}
    google:
      api-key: ${LIBRARY_GOOGLE_BOOKS_API_KEY:}

springdoc:
  api-docs:
    enabled: ${LIBRARY_SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${LIBRARY_SWAGGER_ENABLED:false}
    tags-sorter: alpha
    operations-sorter: alpha
